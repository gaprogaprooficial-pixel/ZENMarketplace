<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEXUS UNIVERSE | LIGHT CORE v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;700&display=swap');
        :root { --n-green: #00ffaa; --n-blue: #00d4ff; }
        body { background: #010101; color: white; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(25px); border: 1px solid rgba(0,255,170,0.15); }
        .input-nexus { background: rgba(0,255,170,0.05); border: 1px solid rgba(0,255,170,0.3); padding: 15px; border-radius: 15px; color: var(--n-green); outline: none; transition: 0.3s; text-align: center; font-weight: bold; }
        .input-nexus:focus { border-color: var(--n-green); box-shadow: 0 0 20px rgba(0,255,170,0.2); }
        .v-admin { color: #facc15; text-shadow: 0 0 8px #facc15; }
        #app-shell, #modal-admin { display: none; }
    </style>
</head>
<body>

<div id="login-gate" class="fixed inset-0 z-[500] flex items-center justify-center bg-black">
    <div class="max-w-md w-full glass p-10 rounded-[40px] border-t-2 border-[#00ffaa]">
        <div class="text-center mb-10">
            <h1 class="orbitron text-4xl font-black italic text-[#00ffaa]">NEXUS ACCESS</h1>
            <p class="text-[10px] tracking-[0.4em] text-gray-500 mt-2 uppercase">Validación de Doble Llave</p>
        </div>

        <div class="space-y-6">
            <div class="flex flex-col gap-2">
                <label class="text-[10px] text-gray-400 ml-2">ID DE USUARIO / ALIAS</label>
                <input type="text" id="log-user" placeholder="Nombre de Usuario" class="input-nexus w-full">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-gray-400 ml-2">LLAVE ALFA</label>
                    <input type="password" id="key-alpha" placeholder="****" class="input-nexus w-full">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] text-gray-400 ml-2">LLAVE BETA</label>
                    <input type="password" id="key-beta" placeholder="****" class="input-nexus w-full">
                </div>
            </div>

            <button onclick="intentarEntrar()" class="w-full bg-[#00ffaa] text-black font-black py-5 rounded-2xl orbitron hover:shadow-[0_0_30px_#00ffaa] transition-all uppercase mt-4">Conectar al Núcleo</button>
        </div>
        
        <p class="text-[9px] text-center mt-8 text-gray-600">SISTEMA PROTEGIDO POR NEXUS OS © 2026</p>
    </div>
</div>

<div id="app-shell" class="h-screen flex flex-col">
    <header class="p-6 glass flex justify-between items-center">
        <div class="flex items-center gap-4">
            <img id="u-img" class="w-12 h-12 rounded-full border-2 border-[#00ffaa] cursor-pointer" onclick="openProfile()">
            <div>
                <span id="u-name" class="font-black orbitron"></span>
                <span id="u-badge"></span>
            </div>
        </div>
        <button id="admin-trigger" class="hidden bg-red-600 text-white px-6 py-2 rounded-xl text-[10px] font-black orbitron" onclick="openAdmin()">MASTER PANEL</button>
    </header>

    <main class="flex-1 flex flex-col p-6 overflow-hidden">
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 mb-4"></div>
        <div class="p-4 glass rounded-2xl flex gap-4">
            <input type="text" id="chat-in" placeholder="Enviar comando..." class="flex-1 bg-transparent outline-none" onkeypress="if(event.key=='Enter') sendChat()">
            <button onclick="sendChat()" class="bg-[#00ffaa] text-black px-8 py-2 rounded-xl font-black text-xs">OK</button>
        </div>
    </main>
</div>

<div id="modal-admin" class="fixed inset-0 z-[1000] bg-black p-10 flex flex-col">
    <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
        <h2 class="orbitron text-3xl text-red-600 italic">ADMIN CONTROL</h2>
        <button onclick="closeAdmin()" class="bg-white/10 px-6 py-2 rounded-lg text-xs">CERRAR</button>
    </div>
    <div class="flex-1 overflow-y-auto">
        <table class="w-full text-left">
            <thead class="text-xs text-gray-500 border-b border-white/5">
                <tr><th class="p-4">USUARIO</th><th class="p-4">LLAVES (1 y 2)</th><th class="p-4">ACCIONES</th></tr>
            </thead>
            <tbody id="admin-table"></tbody>
        </table>
    </div>
</div>

<script>
// --- CONFIGURACIÓN DE ACCESO ---
const MASTER_USER = "Maestro_Nexus_2026";
const MASTER_K1 = "NX1"; // Llave Alfa
const MASTER_K2 = "NX2"; // Llave Beta

let users = JSON.parse(localStorage.getItem('nexus_u')) || [];
let chats = JSON.parse(localStorage.getItem('nexus_c')) || [];
let current = null;

// INICIALIZAR 100 USUARIOS SI NO EXISTEN
if(users.length < 100) {
    for(let i=1; i<=100; i++) {
        let name = (i === 1) ? MASTER_USER : `Player_${i.toString().padStart(3, '0')}`;
        users.push({
            name: name,
            k1: (i === 1) ? MASTER_K1 : `A${i}`,
            k2: (i === 1) ? MASTER_K2 : `B${i}`,
            isAdmin: (i === 1),
            isVerified: (i <= 10),
            isBan: false,
            photo: `https://ui-avatars.com/api/?name=${name}&background=random`
        });
    }
    localStorage.setItem('nexus_u', JSON.stringify(users));
}

function intentarEntrar() {
    const u = document.getElementById('log-user').value.trim();
    const k1 = document.getElementById('key-alpha').value.trim();
    const k2 = document.getElementById('key-beta').value.trim();

    const found = users.find(x => x.name === u && x.k1 === k1 && x.k2 === k2);

    if(found) {
        if(found.isBan) return alert("SISTEMA: Estás baneado.");
        current = found;
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('app-shell').style.display = 'flex';
        document.getElementById('u-name').innerText = current.name;
        document.getElementById('u-img').src = current.photo;
        if(current.isAdmin) document.getElementById('admin-trigger').style.display = 'block';
        renderBadges();
        renderChats();
    } else {
        alert("ERROR: Credenciales inválidas.");
    }
}

function sendChat() {
    const input = document.getElementById('chat-in');
    if(!input.value) return;
    chats.push({ user: current.name, text: input.value, admin: current.isAdmin });
    input.value = "";
    localStorage.setItem('nexus_c', JSON.stringify(chats));
    renderChats();
}

function renderChats() {
    const box = document.getElementById('chat-box');
    box.innerHTML = chats.map(c => `
        <div class="p-4 glass rounded-2xl border-l-4 ${c.admin ? 'border-yellow-500' : 'border-cyan-500'}">
            <p class="text-[10px] font-bold ${c.admin ? 'v-admin' : 'text-cyan-400'}">${c.user}</p>
            <p class="text-sm mt-1">${c.text}</p>
        </div>
    `).join('');
    box.scrollTop = box.scrollHeight;
}

function openAdmin() {
    document.getElementById('modal-admin').style.display = 'flex';
    const table = document.getElementById('admin-table');
    table.innerHTML = users.map(u => `
        <tr class="border-b border-white/5">
            <td class="p-4 text-xs font-bold">${u.name}</td>
            <td class="p-4 text-xs font-mono text-emerald-400">${u.k1} | ${u.k2}</td>
            <td class="p-4 flex gap-2">
                <button onclick="ban('${u.name}')" class="bg-red-600/20 text-red-500 px-3 py-1 rounded text-[10px]">BAN</button>
            </td>
        </tr>
    `).join('');
}

function ban(name) {
    if(name === MASTER_USER) return;
    users = users.map(u => u.name === name ? {...u, isBan: true} : u);
    localStorage.setItem('nexus_u', JSON.stringify(users));
    openAdmin();
}

function closeAdmin() { document.getElementById('modal-admin').style.display = 'none'; }
function renderBadges() { document.getElementById('u-badge').innerHTML = current.isAdmin ? '<span class="v-admin text-[10px] ml-2">★ MASTER</span>' : ''; }
</script>
</body>
</html>
