<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZenMail • Correo Zen</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
    :root {
      --primary: #0066ff;
      --bg: #fff;
      --text: #202124;
      --text-sec: #5f6368;
      --sidebar: #f6f8fc;
      --hover: #e8f0fe;
      --border: #dadce0;
    }
    [data-theme="dark"] {
      --primary: #8ab4f8;
      --bg: #0f0f0f;
      --text: #e8eaed;
      --text-sec: #9aa0a6;
      --sidebar: #202124;
      --hover: #303134;
      --border: #3c4043;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background:var(--bg); color:var(--text);
      height:100vh; overflow:hidden;
      display:flex; flex-direction:column;
      transition:background 0.3s, color 0.3s;
    }
    header {
      height:64px; background:var(--bg); border-bottom:1px solid var(--border);
      display:flex; align-items:center; padding:0 16px; gap:20px;
    }
    .logo { display:flex; align-items:center; gap:8px; font-size:22px; font-weight:500; color:var(--primary); }
    .search-container {
      flex:1; max-width:680px; background:var(--hover); border-radius:40px;
      padding:8px 16px; display:flex; align-items:center; gap:12px;
    }
    .search-container input { border:none; background:transparent; flex:1; color:var(--text); outline:none; }
    .profile-area { display:flex; align-items:center; gap:16px; }
    .profile {
      width:36px; height:36px; border-radius:50%; background:#8ab4f8; color:white;
      display:flex; align-items:center; justify-content:center; font-weight:500; cursor:pointer;
      position:relative;
    }
    .verified-badge {
      position:absolute; bottom:-4px; right:-4px; width:16px; height:16px;
    }
    .main { flex:1; display:flex; overflow:hidden; }
    aside {
      width:260px; background:var(--sidebar); border-right:1px solid var(--border);
      padding:16px 8px; overflow-y:auto;
    }
    .compose-btn {
      width:100%; background:var(--primary); color:white; border:none; border-radius:24px;
      padding:14px; font-size:15px; font-weight:500; margin-bottom:24px;
      display:flex; align-items:center; justify-content:center; gap:10px; cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }
    .menu-item {
      display:flex; align-items:center; gap:20px; padding:12px 20px;
      font-size:14px; color:var(--text-sec); border-radius:0 24px 24px 0;
      cursor:pointer; margin-right:8px;
    }
    .menu-item:hover, .menu-item.active { background:var(--hover); color:var(--primary); }
    .email-content { flex:1; display:flex; flex-direction:column; }
    .toolbar { height:48px; border-bottom:1px solid var(--border); padding:0 16px; display:flex; align-items:center; gap:16px; }
    .email-list { flex:1; overflow-y:auto; }
    .email-row {
      display:flex; align-items:center; padding:10px 24px; border-bottom:1px solid var(--border);
      cursor:pointer; position:relative;
    }
    .email-row:hover { background:var(--hover); }
    .email-row.unread { font-weight:500; }
    .email-from { width:220px; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .email-subject { flex:1; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .email-snippet { color:var(--text-sec); font-size:13px; margin-left:16px; flex:2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .email-date { color:var(--text-sec); font-size:13px; min-width:80px; text-align:right; }
    .report-btn {
      background:#d93025; color:white; border:none; border-radius:4px;
      padding:5px 10px; font-size:12px; cursor:pointer; margin-left:12px; opacity:0; transition:opacity 0.2s;
    }
    .email-row:hover .report-btn { opacity:0.9; }

    /* Modal Redactar */
    #compose-modal {
      position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:2000;
    }
    .modal-content {
      background:var(--bg); width:90%; max-width:680px; border-radius:12px; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }
    .modal-header { padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .modal-body { padding:20px; }
    .compose-to, .compose-subject { width:100%; padding:12px; margin-bottom:12px; border:1px solid var(--border); border-radius:4px; background:var(--hover); color:var(--text); }
    #compose-body { width:100%; height:280px; padding:12px; border:1px solid var(--border); border-radius:4px; resize:none; background:var(--hover); color:var(--text); font-family:inherit; }
    .format-bar { margin-bottom:12px; display:flex; gap:8px; }
    .format-btn { background:var(--hover); border:1px solid var(--border); padding:6px 10px; border-radius:4px; cursor:pointer; }

    /* Admin Panel */
    #admin-panel { display:none; flex:1; padding:24px; overflow-y:auto; }
    table { width:100%; border-collapse:collapse; margin:20px 0; }
    th, td { padding:12px; border-bottom:1px solid var(--border); text-align:left; }
    .action-btn { padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }

    @media (max-width:900px) { aside { width:72px; } aside span:not(.material-icons) { display:none; } }
  </style>
</head>
<body data-theme="light">

  <!-- Login -->
  <div id="login-page" style="position:fixed;inset:0;background:rgba(255,255,255,0.98);display:flex;align-items:center;justify-content:center;z-index:3000;">
    <div style="background:var(--bg);padding:32px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,0.2);width:340px;">
      <h2>ZenMail</h2>
      <input type="text" id="username" placeholder="Usuario" style="width:100%;padding:12px;margin:12px 0;border:1px solid var(--border);border-radius:4px;"/>
      <input type="password" id="password" placeholder="Contraseña" style="width:100%;padding:12px;margin:12px 0;border:1px solid var(--border);border-radius:4px;"/>
      <button onclick="login()" style="width:100%;padding:12px;background:var(--primary);color:white;border:none;border-radius:4px;cursor:pointer;">Entrar</button>
      <p style="margin-top:16px;font-size:13px;color:var(--text-sec);">Admin: <b>admin</b> • <b>X7pQ#9LmT$4vK2eR!8wZ</b></p>
    </div>
  </div>

  <header>
    <div class="logo"><span class="material-icons">auto_awesome</span>ZenMail</div>
    <div class="search-container">
      <span class="material-icons">search</span>
      <input type="text" placeholder="Buscar..."/>
    </div>
    <div class="profile-area">
      <div class="profile" id="profile" onclick="toggleTheme()">Z
        <svg id="verified" class="verified-badge" width="18" height="18" viewBox="0 0 24 24" style="display:none;">
          <circle cx="12" cy="12" r="10" fill="#1a73e8"/>
          <path d="M9 16.2l-3.5-3.5 1.4-1.4 2.1 2.1 5.6-5.6 1.4 1.4z" fill="white"/>
        </svg>
      </div>
    </div>
  </header>

  <div class="main">
    <aside>
      <button class="compose-btn" onclick="openCompose()">
        <span class="material-icons">edit</span> Redactar
      </button>

      <div class="menu-item active" onclick="showSection('inbox')">
        <span class="material-icons">inbox</span> Bandeja
      </div>
      <div class="menu-item" onclick="showSection('spam')">
        <span class="material-icons">report</span> Spam / Reportados (<span id="spam-count">0</span>)
      </div>

      <div class="menu-separator" style="height:1px;background:var(--border);margin:20px 0;"></div>

      <div class="menu-item" id="admin-menu" style="display:none;" onclick="showAdminPanel()">
        <span class="material-icons">admin_panel_settings</span> Admin
      </div>
    </aside>

    <section class="email-content" id="email-content">
      <div class="toolbar">
        <span class="material-icons">refresh" onclick="loadEmails()">refresh</span>
      </div>
      <div class="email-list" id="email-list"></div>
    </section>

    <section id="admin-panel">
      <h2>Panel Admin</h2>
      <button class="action-btn" style="background:#d93025;color:white;" onclick="clearReports()">Limpiar reportes</button>
      <h3>Usuarios</h3>
      <table><thead><tr><th>Usuario</th><th>Pass (demo)</th><th>Estado</th><th>Acción</th></tr></thead><tbody id="user-list"></tbody></table>

      <h3>Denuncias</h3>
      <table><thead><tr><th>Por</th><th>Correo</th><th>Motivo</th><th>Fecha</th></tr></thead><tbody id="report-list"></tbody></table>
    </section>
  </div>

  <!-- Modal Redactar -->
  <div id="compose-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Nuevo mensaje</h3>
        <span class="material-icons" onclick="closeCompose()" style="cursor:pointer;">close</span>
      </div>
      <div class="modal-body">
        <input class="compose-to" placeholder="Para" id="compose-to"/>
        <input class="compose-subject" placeholder="Asunto" id="compose-subject"/>
        <div class="format-bar">
          <button class="format-btn" onclick="formatText('bold')">B</button>
          <button class="format-btn" onclick="formatText('italic')">I</button>
        </div>
        <textarea id="compose-body" placeholder="Escribe tu mensaje..."></textarea>
        <button style="margin-top:16px;padding:12px 24px;background:var(--primary);color:white;border:none;border-radius:24px;cursor:pointer;" onclick="sendEmail()">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    const usersKey = 'zenmail_users';
    const reportsKey = 'zenmail_reports';
    const spamKey = 'zenmail_spam';

    if (!localStorage.getItem(usersKey)) {
      localStorage.setItem(usersKey, JSON.stringify([
        {username:'admin', password:'X7pQ#9LmT$4vK2eR!8wZ', banned:false},
        {username:'gapro', password:'demo123', banned:false}
      ]));
    }
    if (!localStorage.getItem(reportsKey)) localStorage.setItem(reportsKey, '[]');
    if (!localStorage.getItem(spamKey)) localStorage.setItem(spamKey, '[]');

    let currentUser = null;
    let isAdmin = false;

    function login() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const users = JSON.parse(localStorage.getItem(usersKey));
      const user = users.find(x => x.username === u && x.password === p);

      if (user && !user.banned) {
        currentUser = u;
        isAdmin = (u === 'admin');
        document.getElementById('login-page').style.display = 'none';
        if (isAdmin) document.getElementById('admin-menu').style.display = 'flex';
        if (u === 'admin' || u === 'gapro') document.getElementById('verified').style.display = 'block';
        loadEmails();
      } else {
        alert(user ? 'Cuenta baneada' : 'Credenciales incorrectas');
      }
    }

    function loadEmails(section = 'inbox') {
      const list = document.getElementById('email-list');
      list.innerHTML = '';

      let emails = [
        {from:'equipo@xai.com', subject:'Grok 5 ya entrena', snippet:'Próximo salto cuántico...', date:'hoy', unread:true, reported:false},
        {from:'example@zenmail.com', subject:'Oferta Premium', snippet:'Duplica tu espacio gratis...', date:'10:15', unread:true, reported:false},
        {from:'noticias@elheraldo.co', subject:'Titulares Barranquilla', snippet:'Tráfico en la 30 hoy...', date:'ayer', unread:false, reported:false}
      ];

      const spam = JSON.parse(localStorage.getItem(spamKey));
      document.getElementById('spam-count').textContent = spam.length;

      if (section === 'spam') {
        emails = spam;
      }

      emails.forEach((e, i) => {
        const row = document.createElement('div');
        row.className = `email-row ${e.unread ? 'unread' : ''}`;
        row.innerHTML = `
          <div class="email-from">${e.from}</div>
          <div class="email-subject">${e.subject}</div>
          <div class="email-snippet">${e.snippet}</div>
          <div class="email-date">${e.date}</div>
          ${section !== 'spam' ? `<button class="report-btn" onclick="reportEmail(${i}, '${e.from}', '${e.subject}')">Denunciar</button>` : ''}
        `;
        row.onclick = () => row.classList.remove('unread');
        list.appendChild(row);
      });
    }

    function reportEmail(index, from, subject) {
      const motivo = prompt('Motivo (opcional):') || 'Contenido inapropiado';
      const reports = JSON.parse(localStorage.getItem(reportsKey));
      reports.push({by:currentUser, email:from, subject, motivo, date:new Date().toLocaleString()});
      localStorage.setItem(reportsKey, JSON.stringify(reports));

      // Mover a spam
      const spam = JSON.parse(localStorage.getItem(spamKey));
      spam.push({from, subject, snippet:'[Denunciado por usuario]', date:new Date().toLocaleString().split(',')[0], reported:true});
      localStorage.setItem(spamKey, JSON.stringify(spam));

      alert('Denuncia enviada • Correo movido a Spam');
      loadEmails();
      if (isAdmin) showAdminPanel();
    }

    function openCompose() {
      document.getElementById('compose-modal').style.display = 'flex';
    }
    function closeCompose() {
      document.getElementById('compose-modal').style.display = 'none';
    }
    function formatText(type) {
      const area = document.getElementById('compose-body');
      const start = area.selectionStart, end = area.selectionEnd;
      const text = area.value;
      let tagOpen = type === 'bold' ? '**' : '*';
      let tagClose = tagOpen;
      area.value = text.slice(0, start) + tagOpen + text.slice(start, end) + tagClose + text.slice(end);
      area.focus();
    }
    function sendEmail() {
      alert('Correo enviado (simulado) → ' + document.getElementById('compose-to').value);
      closeCompose();
    }

    function showAdminPanel() {
      document.getElementById('email-content').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';

      // Usuarios
      const users = JSON.parse(localStorage.getItem(usersKey));
      document.getElementById('user-list').innerHTML = users.map((u,i) => u.username==='admin' ? '' : `
        <tr>
          <td>${u.username}</td><td>${u.password}</td><td>${u.banned?'Baneado':'Activo'}</td>
          <td><button class="action-btn" style="background:${u.banned?'#34a853':'#d93025'};color:white;" onclick="toggleBan(${i})">${u.banned?'Desbanear':'Banear'}</button></td>
        </tr>
      `).join('');

      // Reportes
      const reports = JSON.parse(localStorage.getItem(reportsKey));
      document.getElementById('report-list').innerHTML = reports.map(r => `
        <tr><td>${r.by}</td><td>${r.email}</td><td>${r.motivo}</td><td>${r.date}</td></tr>
      `).join('');
    }

    function toggleBan(i) {
      const users = JSON.parse(localStorage.getItem(usersKey));
      users[i].banned = !users[i].banned;
      localStorage.setItem(usersKey, JSON.stringify(users));
      showAdminPanel();
    }

    function clearReports() {
      if (confirm('¿Borrar todas las denuncias?')) {
        localStorage.setItem(reportsKey, '[]');
        showAdminPanel();
      }
    }

    function toggleTheme() {
      const theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
      document.body.dataset.theme = theme;
      localStorage.setItem('zenmail-theme', theme);
    }

    // Init theme
    if (localStorage.getItem('zenmail-theme') === 'dark' || (!localStorage.getItem('zenmail-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.dataset.theme = 'dark';
    }

    function showSection(sec) {
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('email-content').style.display = 'flex';
      loadEmails(sec);
    }
  </script>
</body>
</html>
