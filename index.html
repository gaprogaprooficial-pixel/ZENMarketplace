<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEXUS MARKET | Vende y Compra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;700&display=swap');
        body { background: #0a0a0a; color: white; font-family: 'JetBrains Mono', monospace; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 170, 0.1); }
        .input-nexus { background: #151515; border: 1px solid #333; padding: 12px; border-radius: 10px; color: white; outline: none; transition: 0.3s; }
        .input-nexus:focus { border-color: #00ffaa; box-shadow: 0 0 10px rgba(0, 255, 170, 0.2); }
        .card-prod { transition: 0.3s; border: 1px solid #222; }
        .card-prod:hover { transform: translateY(-5px); border-color: #00ffaa; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        #modal-sell { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex justify-between items-center mb-12">
        <div>
            <h1 class="orbitron text-3xl font-black text-[#00ffaa] italic">NEXUS MARKET</h1>
            <p class="text-[10px] text-gray-500 tracking-[0.3em]">SISTEMA DE COMERCIO GLOBAL 2026</p>
        </div>
        <button onclick="toggleSell(true)" class="bg-[#00ffaa] text-black px-8 py-3 rounded-full font-black orbitron text-xs hover:scale-105 transition-all">
            + PUBLICAR PRODUCTO
        </button>
    </header>

    <main class="max-w-7xl mx-auto">
        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="modal-sell" class="fixed inset-0 z-[1000] bg-black/90 flex items-center justify-center p-4">
        <div class="glass w-full max-w-lg p-8 rounded-[30px] relative">
            <button onclick="toggleSell(false)" class="absolute top-6 right-6 text-gray-500 hover:text-white">✕</button>
            
            <h2 class="orbitron text-2xl text-[#00ffaa] mb-6">DETALLES DEL PRODUCTO</h2>
            
            <div class="flex flex-col gap-4">
                <input type="text" id="p-name" placeholder="Nombre del Producto" class="input-nexus">
                <input type="number" id="p-price" placeholder="Precio ($)" class="input-nexus">
                
                <hr class="border-white/5 my-2">
                <p class="text-[10px] text-gray-500 mb-1">DATOS DEL VENDEDOR</p>
                
                <input type="text" id="v-name" placeholder="Tu Nombre / Alias" class="input-nexus">
                <input type="email" id="v-email" placeholder="Correo Gmail" class="input-nexus">
                <input type="tel" id="v-phone" placeholder="WhatsApp (Ej: +57300...)" class="input-nexus">
                
                <button onclick="publishProduct()" class="w-full bg-[#00ffaa] text-black py-4 rounded-xl font-black orbitron mt-4">
                    PUBLICAR AHORA
                </button>
            </div>
        </div>
    </div>

    <script>
        // Base de Datos de Productos
        let products = JSON.parse(localStorage.getItem('nexus_market_data')) || [
            {
                name: "Nvidia RTX 5090 Nexus Edition",
                price: "2499",
                v_name: "Admin_Zero",
                v_email: "admin@nexus.com",
                v_phone: "123456789",
                date: "06/03/2026"
            }
        ];

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            products.forEach((p, index) => {
                grid.innerHTML += `
                    <div class="card-prod glass p-6 rounded-[25px] flex flex-col">
                        <div class="bg-gradient-to-br from-[#00ffaa]/20 to-transparent h-32 rounded-2xl mb-4 flex items-center justify-center">
                            <span class="text-4xl">📦</span>
                        </div>
                        <h3 class="orbitron text-lg font-bold mb-1">${p.name}</h3>
                        <p class="text-[#00ffaa] font-black text-xl mb-4">$${p.price}</p>
                        
                        <div class="mt-auto pt-4 border-t border-white/5 space-y-2">
                            <p class="text-[10px] text-gray-400">Vendedor: <span class="text-white">${p.v_name}</span></p>
                            
                            <div class="flex gap-2 pt-2">
                                <a href="https://wa.me/${p.v_phone}?text=Hola%20estoy%20interesado%20en%20tu%20producto:%20${p.name}" target="_blank" 
                                   class="flex-1 bg-green-600/20 text-green-400 text-center py-2 rounded-lg text-[10px] font-bold hover:bg-green-600 hover:text-white transition-all">
                                   WHATSAPP
                                </a>
                                <a href="mailto:${p.v_email}?subject=Interés en producto: ${p.name}" 
                                   class="flex-1 bg-blue-600/20 text-blue-400 text-center py-2 rounded-lg text-[10px] font-bold hover:bg-blue-600 hover:text-white transition-all">
                                   GMAIL
                                </a>
                            </div>
                            ${p.v_name === "Admin_Zero" ? '' : `<button onclick="deleteProduct(${index})" class="w-full text-[9px] text-red-500 mt-2 opacity-30 hover:opacity-100">BORRAR PUBLICACIÓN</button>`}
                        </div>
                    </div>
                `;
            });
        }

        function publishProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const v_name = document.getElementById('v-name').value;
            const v_email = document.getElementById('v-email').value;
            const v_phone = document.getElementById('v-phone').value;

            if(!name || !price || !v_name || !v_email || !v_phone) {
                return alert("⚠️ Por favor rellena todos los campos.");
            }

            const newProduct = {
                name, price, v_name, v_email, v_phone,
                date: new Date().toLocaleDateString()
            };

            products.unshift(newProduct);
            localStorage.setItem('nexus_market_data', JSON.stringify(products));
            
            // Limpiar y cerrar
            renderProducts();
            toggleSell(false);
            alert("✅ ¡Producto publicado con éxito!");
            
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
        }

        function deleteProduct(index) {
            if(confirm("¿Seguro que quieres quitar este producto?")) {
                products.splice(index, 1);
                localStorage.setItem('nexus_market_data', JSON.stringify(products));
                renderProducts();
            }
        }

        function toggleSell(show) {
            document.getElementById('modal-sell').style.display = show ? 'flex' : 'none';
        }

        // Carga inicial
        renderProducts();
    </script>
</body>
</html>
