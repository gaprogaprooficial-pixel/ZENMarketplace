<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>NEXUS ENGINE v10.0 | FULL STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;700&display=swap');
        body { background: #000; color: white; font-family: 'JetBrains Mono', monospace; overflow: hidden; margin: 0; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Escenario */
        #game-container { width: 100vw; height: 100vh; position: relative; background: #111; overflow: hidden; }
        .grid-layer { position: absolute; inset: 0; background-size: 50px 50px; background-image: linear-gradient(to right, #222 1px, transparent 1px), linear-gradient(to bottom, #222 1px, transparent 1px); }
        
        /* Entidades */
        .entity { width: 50px; height: 50px; position: absolute; transition: all 0.1s linear; box-sizing: border-box; }
        .player { background: #00ffaa; border-radius: 10px; z-index: 100; border: 3px solid #fff; box-shadow: 0 0 20px #00ffaa; }
        .player-head { width: 20px; height: 20px; background: #fff; margin: 5px auto; border-radius: 5px; }
        
        /* Tipos de Bloques */
        .b-wall { background: #444; border: 4px solid #333; z-index: 10; } /* Sólido */
        .b-lava { background: #ff4400; box-shadow: inset 0 0 15px #000; z-index: 5; } /* Script: Daño */
        .b-coin { background: #facc15; border-radius: 50%; transform: scale(0.5); z-index: 5; } /* Script: Dinero */
        .b-portal { background: #9333ea; animation: pulse 1s infinite; z-index: 5; }

        /* Chat en Juego */
        .bubble { position: absolute; background: white; color: black; padding: 5px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; width: max-content; bottom: 60px; left: 50%; transform: translateX(-50%); pointer-events: none; }

        #ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
        .interactive { pointer-events: auto; }
        #studio-panel { display: none; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="game-container">
    <div class="grid-layer"></div>
    <div id="world"></div>
    <div id="player" class="entity player">
        <div class="player-head"></div>
        <div id="player-bubble" class="bubble" style="display:none"></div>
    </div>
</div>

<div id="ui-layer">
    <div class="p-6 flex justify-between items-end h-full">
        <div class="space-y-4 interactive">
            <div class="glass p-4 rounded-2xl border border-white/10 bg-black/50">
                <p class="orbitron text-[#00ffaa] text-sm">NEXUS OS v10.0</p>
                <p class="text-[10px] text-yellow-500 font-bold">COINS: <span id="coin-count">500</span></p>
            </div>
            <div class="w-80 h-40 glass rounded-xl bg-black/60 p-2 overflow-y-auto text-[10px]" id="chat-logs"></div>
            <input type="text" id="chat-input" placeholder="Presiona Enter para hablar..." class="w-80 bg-black/80 border border-[#00ffaa] p-2 rounded text-xs outline-none">
        </div>

        <div class="flex flex-col gap-2 interactive">
            <button onclick="toggleStudio()" class="bg-purple-600 px-6 py-3 rounded-xl font-black orbitron text-xs">ABRIR STUDIO</button>
            <button id="admin-btn" class="hidden bg-red-600 px-6 py-3 rounded-xl font-black orbitron text-xs">ADMIN PANEL</button>
        </div>
    </div>
</div>

<div id="studio-panel" class="fixed top-0 right-0 w-64 h-full bg-[#111] border-l border-purple-500 p-6 flex flex-col gap-4 z-[2000]">
    <h2 class="orbitron text-purple-500 font-black">STUDIO TOOL</h2>
    <hr class="border-white/10">
    <label class="text-[10px]">TIPO DE BLOQUE</label>
    <select id="block-type" class="bg-black border border-white/20 p-2 rounded text-xs">
        <option value="b-wall">MURO (SÓLIDO)</option>
        <option value="b-lava">LAVA (SCRIPT: KILL)</option>
        <option value="b-coin">COIN (SCRIPT: GIVE)</option>
        <option value="b-portal">PORTAL (SCRIPT: WIN)</option>
    </select>
    <div class="mt-auto space-y-2">
        <button onclick="saveWorld()" class="w-full bg-green-600 py-2 rounded font-bold text-xs">GUARDAR MAPA</button>
        <button onclick="toggleStudio()" class="w-full bg-white/10 py-2 rounded font-bold text-xs">CERRAR STUDIO</button>
    </div>
</div>

<script>
// --- CONFIGURACIÓN INICIAL ---
let px = 100, py = 100;
let blocks = JSON.parse(localStorage.getItem('nx_world_blocks')) || [];
let studioMode = false;
let coins = 500;

const player = document.getElementById('player');
const world = document.getElementById('world');

// --- MOTOR DE MOVIMIENTO Y COLISIÓN ---
document.addEventListener('keydown', (e) => {
    if(document.activeElement.tagName === 'INPUT') return;
    
    let nextX = px, nextY = py;
    const speed = 50;

    if(e.key === 'ArrowUp') nextY -= speed;
    if(e.key === 'ArrowDown') nextY += speed;
    if(e.key === 'ArrowLeft') nextX -= speed;
    if(e.key === 'ArrowRight') nextX += speed;

    if(!checkCollision(nextX, nextY)) {
        px = nextX; py = nextY;
        updatePlayer();
        checkScripts(px, py);
    }
});

function checkCollision(nx, ny) {
    // Colisión con muros (bloques tipo b-wall)
    return blocks.some(b => b.x === nx && b.y === ny && b.type === 'b-wall');
}

function checkScripts(nx, ny) {
    blocks.forEach((b, index) => {
        if(b.x === nx && b.y === ny) {
            if(b.type === 'b-lava') {
                alert("TE QUEMASTE EN LA LAVA");
                px = 100; py = 100; updatePlayer();
            }
            if(b.type === 'b-coin') {
                coins += 50;
                document.getElementById('coin-count').innerText = coins;
                blocks.splice(index, 1); // Desaparece al recoger
                renderWorld();
            }
        }
    });
}

function updatePlayer() {
    player.style.left = px + 'px';
    player.style.top = py + 'px';
}

// --- SISTEMA DE STUDIO ---
document.getElementById('game-container').onclick = function(e) {
    if(!studioMode) return;
    const x = Math.floor(e.clientX / 50) * 50;
    const y = Math.floor(e.clientY / 50) * 50;
    const type = document.getElementById('block-type').value;

    // Quitar bloque si ya existe en esa posición
    const existing = blocks.findIndex(b => b.x === x && b.y === y);
    if(existing !== -1) blocks.splice(existing, 1);

    blocks.push({ x, y, type });
    renderWorld();
};

function renderWorld() {
    world.innerHTML = blocks.map(b => `
        <div class="entity ${b.type}" style="left:${b.x}px; top:${b.y}px"></div>
    `).join('');
}

function toggleStudio() {
    studioMode = !studioMode;
    document.getElementById('studio-panel').style.display = studioMode ? 'flex' : 'none';
    alert(studioMode ? "MODO STUDIO: Haz clic en el suelo para poner bloques." : "MODO JUEGO: Usa las flechas para moverte.");
}

// --- SISTEMA DE CHAT ---
const chatInput = document.getElementById('chat-input');
const bubble = document.getElementById('player-bubble');

chatInput.onkeypress = function(e) {
    if(e.key === 'Enter' && this.value.trim() !== "") {
        const msg = this.value;
        // Mostrar burbuja sobre el jugador
        bubble.innerText = msg;
        bubble.style.display = 'block';
        
        // Log en la caja de chat
        const log = document.createElement('div');
        log.innerHTML = `<b class="text-[#00ffaa]">TÚ:</b> ${msg}`;
        document.getElementById('chat-logs').appendChild(log);
        document.getElementById('chat-logs').scrollTop = 9999;

        setTimeout(() => bubble.style.display = 'none', 3000);
        this.value = "";
    }
};

function saveWorld() {
    localStorage.setItem('nx_world_blocks', JSON.stringify(blocks));
    alert("MAPA GUARDADO EN LA NUBE.");
}

// Inicializar
renderWorld();
updatePlayer();
</script>
</body>
</html>
